<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 1</title>
    <style>
      .container {
        width: 500px;
        margin: 20px auto;
      }
      h3 {
        text-align: center;
      }
      table {
        width: 100%;
      }
      table,
      td,
      th {
        border: 1px solid black;
      }
      th {
        background-color: yellow;
        padding: 5px 0 5px 80px;
      }
      td {
        text-align: left;
      }
      .special {
        background-color: darksalmon;
        text-align: center;
      }
      .last-row {
        font-weight: 800;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h3>Ninja Details</h3>
      <hr />
      <table>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>Grade</th>
        </tr>
        <tr>
          <td class="special">Ninja A</td>
          <td>18</td>
          <td>B</td>
        </tr>
        <tr>
          <td>Ninja B</td>
          <td>23</td>
          <td>C</td>
        </tr>
        <tr>
          <td>Ninja C</td>
          <td>22</td>
          <td>A</td>
        </tr>
        <tr>
          <td class="last-row" colspan="3">Ninja C - the best learner!</td>
        </tr>
      </table>
    </div>
  </body>
</html>
